<!DOCTYPE html>
<html lang="pt-BR">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Flexbox centralizado</title>

        <style>
            * {
                margin: 0px;
                padding: 0px;
                box-sizing: border-box;
            }

            body {
                background-color: lightsalmon;
            }

            main {
                width: 100vw;
                height: 100vh;
                background-color: lightgreen;

                display: flex;
                flex-flow: row nowrap;
                justify-content: center;
                align-items: center;
            }

            section {
                background-color: lightseagreen;
                width: 250px;
                height: 200px;

                display: flex;
                flex-flow: row nowrap;
                justify-content: center;
                align-items: center;
            }

        </style>
    </head>

    <body>
        <main>
            <section>
                <h1>Tela de Login</h1>
            </section>
        </main>
    </body>

</html>
