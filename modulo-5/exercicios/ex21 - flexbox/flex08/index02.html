<!DOCTYPE html>
<html lang="pt-BR">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Flexbox - Controle dos tamanhos</title>

        <style>
            .container {
                background-color: #402e61;
                padding: 5px;

                display: flex;
                flex-flow: row nowrap;
            }

            .item {
                background-color: #8f6fb3;
                color: white;
                border: 1px solid black;

                text-align: center;
                flex-basis: 250px;
                flex-shrink: 1;
                flex-grow: 1;
            }

        </style>
    </head>

    <body>
        <div class="container">
            <div class="item">Item 1</div>
            <div class="item">Item 2</div>
            <div class="item">Item 3</div>
        </div>
    </body>

</html>
