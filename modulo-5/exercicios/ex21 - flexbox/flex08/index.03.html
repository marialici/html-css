<!DOCTYPE html>
<html lang="pt-BR">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Flexbox - Controle dos tamanhos</title>

        <style>
            .container {
                background-color: #402e61;
                padding: 5px;

                display: flex;
                flex-flow: row nowrap;
            }

            .item {
                background-color: #8f6fb3;
                color: white;
                border: 1px solid black;

                text-align: center;
            }

            #caixaA {
                /*flex-grow: 1;
                flex-shrink: 0;
                flex-basis: 200px;*/
                flex: 1 0 200px;
            }

            #caixaB {
                /*flex-grow: 2;
                flex-shrink: 1;
                flex-basis: 150px;*/
                flex: 2 1 150px;
            }

            #caixaC {
                /*flex-grow: 1;
                flex-shrink: 8;
                flex-basis: auto;*/
                flex: 1 8 auto;
            }

        </style>
    </head>

    <body>
        <div class="container">
            <div class="item" id="caixaA">Item 1</div>
            <div class="item" id="caixaB">Item 2</div>
            <div class="item" id="caixaC">Item 3</div>
        </div>
    </body>

</html>
