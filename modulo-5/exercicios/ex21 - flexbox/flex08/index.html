<!DOCTYPE html>
<html lang="pt-BR">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Flexbox - Tamanhos dos itens</title>

        <style>
            .container {
                background-color: #332e61;
                padding: 5px;

                display: flex;
                flex-flow: row wrap;
            }

            .item {
                background-color: #766fb3;
                color: white;
                border: 1px solid black;

                text-align: center;
                flex-basis: 150px;
            }

        </style>
    </head>

    <body>
        <div class="container">
            <div class="item">Item 1</div>
            <div class="item">Outro conteúdo</div>
            <div class="item">Item 3</div>
            <div class="item">Conteúdo um pouco maior</div>
            <div class="item">Item 5</div>
            <div class="item">Conteúdo maior ainda, que via ocupar mais espaço.</div>
            <div class="item">Item 7</div>
        </div>
    </body>

</html>
