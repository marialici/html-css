<!DOCTYPE html>
<html lang="pt-BR">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Formulário Numérico</title>
    </head>

    <body>
        <h1>Teste de Formulário</h1>

        <form action="php/cadastro.php" method="get" autocomplete="on">
            <p>
                <label for="i-nome">Nome:</label>
                <input type="text" id="i-nome" name="nome" required maxlength="30" placeholder="Nome completo" autocomplete="name">
            </p>
            <p>
                <label for="i-media">Média:</label>
                <input type="number" id="i-media" name="media" min="0" max="10" placeholder="0 a 10" step="0.1" value="7">
            </p>
            <p>
                <label for="i-mes">Período Letivo:</label>
                <input type="month" id="i-mes" name="mes" value="2026-04">
            </p>
            <p>
                <label for="i-data">Dia da Prova:</label>
                <input type="date" id="i-data" name="data" value="2026-04-03">
            </p>
            <p>
                <label for="i-hora">Hora da Prova:</label>
                <input type="time" id="i-hora" name="hora" value="22:00">
            </p>
            <p>
                <input type="submit" value="Enviar">
                <input type="reset" value="Limpar">
            </p>
        </form>
    </body>

</html>
