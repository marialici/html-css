<!DOCTYPE html>
<html lang="pt-BR">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Formulário - output</title>
    </head>

    <body>
        <h1>Exemplo de formulário</h1>

        <form action="cadastro.php" method="get">
            <fieldset>
                <legend>Testando output</legend>

                <p>
                    <label for="i-n1">Digite o primeiro número:</label>
                    <input type="number" name="n1" id="i-n1" required oninput="resultado.innerHTML 
                    = Number(n1.value) + Number(n2.value)">
                </p>

                <p>
                    <label for="i-n2">Digite o segundo número:</label>
                    <input type="number" name="n2" id="i-n2" required oninput="resultado.innerHTML 
                    = Number(n1.value) + Number(n2.value)">
                </p>

                <p>
                    <label for="resultado">Resultado da soma:</label>
                    <output for="i-n1 i-n2" id="resultado"></output>
                </p>

            </fieldset>

            <fieldset>
                <legend>output com range</legend>
                <p>
                    <label for="inum">Número:</label>
                    <input type="range" name="num" id="inum" min="0" max="10" value="5" oninput="ival.innerHTML = Number(inum.value)">

                    <output id="ival">5</output>
                </p>
            </fieldset>

            <fieldset>
                <legend>Ano de nascimento</legend>
                <p>
                    <label for="iano">Em que ano você nasceu?</label>
                    <input type="number" name="ano" id="iano" min="1900" max="2026" oninput="calcIdade()">
                </p>

                <p>
                    <label for="iidade">Sua idade é:</label>
                    <output for="iano" id="iidade">0</output>
                </p>
            </fieldset>

            <p>
                <input type="submit" value="Enviar">
                <input type="reset" value="Limpar">
            </p>
        </form>

        <script>
            function calcIdade() {
                let atual = new Date().getFullYear();
                iidade.innerHTML = Number(atual) - Number(iano.value);
            }
        </script>
    </body>

</html>
