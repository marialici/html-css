<!DOCTYPE html>
<html lang="pt-BR">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Input de texto e senha</title>
    </head>

    <body>
        <h1>Teste de Input</h1>

        <form action="php/cadastro.php" method="post" autocomplete="on">
            <p>
                <label for="i-usuario">Usuário:</label>
                <input type="text" name="usuario" id="i-usuario" required minlength="5" maxlength="15" size="15" placeholder="Digite seu usuário" autocomplete="username">
            </p>
            <p>
                <label for="i-senha">Senha:</label>
                <input type="password" name="senha" id="i-senha" required minlength="8" maxlength="20" size="15" placeholder="Digite sua senha" autocomplete="current-password">
            </p>
            <p>
                <input type="submit" value="Enviar">
                <input type="reset" value="Limpar">
            </p>
        </form>
    </body>

</html>
